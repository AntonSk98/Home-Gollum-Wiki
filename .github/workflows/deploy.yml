name: Deploy Secure Wiki

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Hash password for Caddy
      - name: Hash password for Caddy
        id: hash
        run: |
          HASH=$(docker run --rm caddy:2-alpine caddy hash-password --plaintext "${{ secrets.WIKI_PASS }}")
          echo "WIKI_PASS_HASH=$HASH" >> $GITHUB_ENV

      # 3️⃣ Deploy to VM via SSH (idempotent)
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p /home/${{ secrets.VM_USER }}/wiki

            # Copy docker-compose.yml
            cat <<'EOF' > /home/${{ secrets.VM_USER }}/wiki/docker-compose.yml
            $(cat docker-compose.yml)
            EOF

            # Copy Caddyfile
            cat <<'EOF' > /home/${{ secrets.VM_USER }}/wiki/Caddyfile
            $(cat Caddyfile)
            EOF

            # Ensure environment variables
            export WIKI_USER='${{ secrets.WIKI_USER }}'
            export WIKI_PASS_HASH='${{ env.WIKI_PASS_HASH }}'

            # Navigate to wiki folder
            cd /home/${{ secrets.VM_USER }}/wiki

            # Start/update containers idempotently
            docker-compose up -d --remove-orphans