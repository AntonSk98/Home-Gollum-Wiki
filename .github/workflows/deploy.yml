name: Deploy Secure Wiki

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Hash password for Caddy
        id: hash
        run: |
          HASH=$(docker run --rm caddy:2-alpine caddy hash-password --plaintext "${{ secrets.WIKI_PASS }}")
          echo "WIKI_PASS_HASH=$HASH" >> $GITHUB_ENV
      - name: Debug SSH connection
        run: |
          # write private key to file
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          # try connecting (no commands executed, just handshake)
          ssh -o StrictHostKeyChecking=no -i private_key.pem \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            "echo '✅ SSH connection successful as $(whoami)'"

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.yml,Caddyfile"
          target: "/home/${{ secrets.VM_USER }}/wiki/"

      - name: Deploy containers on VM
        uses: appleboy/ssh-action@v0.1.9
        env:
          WIKI_USER: ${{ secrets.WIKI_USER }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: WIKI_USER,WIKI_PASS_HASH
          script: |
            cd /home/${{ secrets.VM_USER }}/wiki
            docker-compose up -d --remove-orphans